<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>NUMERIQ Compatibilitate</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:1080px; height:1920px;
  overflow:hidden; background:#0F1728;
  font-family:'Raleway',sans-serif;
}
.bg {
  position:absolute; inset:0;
  background:radial-gradient(ellipse 120% 60% at 50% 0%, #1e2a4a 0%, #1A1A2E 45%, #0F1728 100%);
}
.bg::before {
  content:''; position:absolute; inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 79px,rgba(201,168,76,0.03) 80px),
    repeating-linear-gradient(90deg,transparent,transparent 79px,rgba(201,168,76,0.025) 80px);
}
#sparkle-canvas { position:fixed; top:0; left:0; width:1080px; height:1920px; pointer-events:none; z-index:1; }
.corner { position:absolute; width:60px; height:60px; border-color:rgba(201,168,76,0.35); border-style:solid; z-index:3; }
.c-tl { top:32px; left:32px; border-width:2px 0 0 2px; }
.c-tr { top:32px; right:32px; border-width:2px 2px 0 0; }
.c-bl { bottom:32px; left:32px; border-width:0 0 2px 2px; }
.c-br { bottom:32px; right:32px; border-width:0 2px 2px 0; }

/* HEADER */
.header {
  position:absolute; top:60px; left:0; right:0;
  display:flex; flex-direction:column; align-items:center; gap:14px; z-index:3;
}
.logo-ring {
  width:150px; height:150px; border-radius:50%;
  border:1.5px solid rgba(201,168,76,0.25);
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle,rgba(201,168,76,0.06) 0%,transparent 70%);
  box-shadow:0 0 50px rgba(201,168,76,0.12);
  overflow:hidden;
}
.logo-ring img { width:138px; height:138px; object-fit:cover; border-radius:50%; }
.brand { font-family:'Cinzel',serif; font-size:52px; font-weight:700; letter-spacing:14px; color:#C9A84C; text-shadow:0 0 40px rgba(201,168,76,0.5); }
.tagline { font-family:'Raleway',sans-serif; font-size:16px; font-weight:300; letter-spacing:6px; color:#B8A97A; text-transform:uppercase; }
.divider { width:300px; height:1px; background:linear-gradient(90deg,transparent,rgba(201,168,76,0.5),transparent); }

/* WAITING STATE */
.waiting {
  position:absolute; top:380px; left:60px; right:60px; bottom:160px;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  padding-top:60px; gap:20px; z-index:3;
  opacity:1; transition:opacity 0.5s ease;
}
.waiting.hidden { opacity:0; pointer-events:none; }
.wait-label { font-family:'Cinzel',serif; font-size:clamp(18px,4.2vw,48px); white-space:nowrap; letter-spacing:3px; color:#C9A84C; text-transform:uppercase; text-shadow:0 0 40px rgba(201,168,76,0.5); }
.wait-line { width:200px; height:1px; background:linear-gradient(90deg,transparent,rgba(201,168,76,0.6),transparent); }
.wait-title { font-family:'Cinzel',serif; font-size:64px; font-weight:700; letter-spacing:4px; color:#C9A84C; text-align:center; line-height:1.2; text-shadow:0 0 50px rgba(201,168,76,0.6),0 0 100px rgba(201,168,76,0.25); }
.cursor { display:inline-block; width:3px; height:38px; background:#C9A84C; vertical-align:middle; margin-left:2px; animation:blink 1.1s ease-in-out infinite; box-shadow:0 0 12px #C9A84C; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* RESULT STATE */
.result {
  position:absolute; top:370px; left:40px; right:40px; bottom:150px;
  display:flex; flex-direction:column; align-items:center; gap:32px; z-index:3;
  opacity:0; pointer-events:none; transition:opacity 0.6s ease;
}
.result.visible { opacity:1; pointer-events:auto; }

/* TWO PERSONS ROW */
.persons-row {
  display:flex; width:100%; gap:20px; align-items:stretch;
}
.person-card {
  flex:1; border:1px solid rgba(201,168,76,0.2); border-radius:14px;
  background:linear-gradient(180deg,rgba(201,168,76,0.05) 0%,rgba(10,16,32,0.6) 100%);
  padding:28px 24px; display:flex; flex-direction:column; align-items:center; gap:12px;
  opacity:0; transform:translateY(20px); transition:all 0.6s ease;
}
.person-card.show { opacity:1; transform:translateY(0); }
.person-card.p2 { transition-delay:0.2s; }
.person-label { font-family:'Cinzel',serif; font-size:13px; letter-spacing:4px; color:rgba(201,168,76,0.5); text-transform:uppercase; }
.person-cifra-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; }
.person-cifra { font-family:'Cinzel',serif; font-size:72px; font-weight:700; color:#C9A84C; line-height:1; text-shadow:0 0 40px rgba(201,168,76,0.6); }
.person-cifra-label { font-family:'Raleway',sans-serif; font-size:12px; letter-spacing:3px; color:rgba(201,168,76,0.5); text-transform:uppercase; }
.person-divider { width:80%; height:1px; background:linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent); }
.person-name { font-family:'Cinzel',serif; font-size:22px; font-weight:600; color:#F0E6CC; text-align:center; letter-spacing:1px; line-height:1.3; }
.person-date { font-family:'Raleway',sans-serif; font-size:16px; color:#B8A97A; letter-spacing:1px; }

/* CIRCLE METER */
.circle-wrap {
  display:flex; flex-direction:column; align-items:center; gap:16px;
  opacity:0; transition:opacity 0.6s ease 0.5s;
}
.circle-wrap.show { opacity:1; }
.circle-svg { filter:drop-shadow(0 0 20px rgba(201,168,76,0.3)); }
.circle-percent { font-family:'Cinzel',serif; font-size:80px; font-weight:700; fill:#C9A84C; }
.circle-sub { font-family:'Raleway',sans-serif; font-size:18px; fill:#B8A97A; letter-spacing:2px; }
.compat-label { font-family:'Cinzel',serif; font-size:18px; letter-spacing:4px; color:#C9A84C; text-transform:uppercase; }

/* MESSAGE */
.compat-msg {
  font-family:'Raleway',sans-serif; font-size:30px; font-weight:400;
  line-height:1.7; color:#F0E6CC; text-align:center;
  padding:0 20px;
  opacity:0; transform:translateY(10px); transition:all 0.6s ease 0.8s;
}
.compat-msg.show { opacity:1; transform:translateY(0); }

/* PARTICLES */
#particles { position:absolute; inset:0; pointer-events:none; z-index:2; }

/* FOOTER */
.footer { position:absolute; bottom:48px; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:8px; z-index:3; }
.site { font-family:'Cinzel',serif; font-size:28px; font-weight:600; letter-spacing:3px; color:#C9A84C; text-shadow:0 0 24px rgba(201,168,76,0.35); }
.footer-sub { font-family:'Raleway',sans-serif; font-size:14px; font-weight:300; letter-spacing:3px; color:#B8A97A; }
</style>
</head>
<body>
<div class="bg"></div>
<canvas id="sparkle-canvas"></canvas>
<canvas id="particles"></canvas>
<div class="corner c-tl"></div><div class="corner c-tr"></div>
<div class="corner c-bl"></div><div class="corner c-br"></div>

<div class="header">
  <div class="logo-ring"><img id="logoImg" alt="NUMERIQ"></div>
  <div class="brand">NUMERIQ</div>
  <div class="tagline">Cifrele nu mint</div>
  <div class="divider"></div>
</div>

<!-- WAITING -->
<div class="waiting" id="waiting">
  <div class="wait-label">✦ Sesiunea de astăzi ✦</div>
  <div class="wait-line"></div>
  <div class="wait-title" id="wait-line1">Compatibilitate</div>
  <div class="wait-title" id="wait-line2">în Dragoste</div>
  <div class="wait-line"></div>
  <div style="margin-top:20px; font-family:'Raleway',sans-serif; font-size:22px; color:#B8A97A; letter-spacing:2px; text-align:center; line-height:1.8;">
    Scrie două date de naștere<br>în chat <span class="cursor"></span>
  </div>
</div>

<!-- RESULT -->
<div class="result" id="result">
  <div class="persons-row">
    <div class="person-card" id="card1">
      <div class="person-label">Persoana 1</div>
      <div class="person-cifra-wrap">
        <div class="person-cifra" id="cifra1">-</div>
        <div class="person-cifra-label">Cifra Vieții</div>
      </div>
      <div class="person-divider"></div>
      <div class="person-name" id="name1">-</div>
      <div class="person-date" id="date1">-</div>
    </div>
    <div class="person-card p2" id="card2">
      <div class="person-label">Persoana 2</div>
      <div class="person-cifra-wrap">
        <div class="person-cifra" id="cifra2">-</div>
        <div class="person-cifra-label">Cifra Vieții</div>
      </div>
      <div class="person-divider"></div>
      <div class="person-name" id="name2">-</div>
      <div class="person-date" id="date2">-</div>
    </div>
  </div>

  <div class="circle-wrap" id="circleWrap">
    <div class="compat-label">Compatibilitate</div>
    <svg class="circle-svg" width="260" height="260" viewBox="0 0 260 260">
      <circle cx="130" cy="130" r="110" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="14"/>
      <circle id="arcCircle" cx="130" cy="130" r="110" fill="none" stroke="url(#goldGrad)" stroke-width="14"
        stroke-linecap="round" stroke-dasharray="691" stroke-dashoffset="691"
        transform="rotate(-90 130 130)" style="transition:stroke-dashoffset 2s ease;"/>
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#8B6E2A"/>
          <stop offset="50%" stop-color="#C9A84C"/>
          <stop offset="100%" stop-color="#E8C96A"/>
        </linearGradient>
      </defs>
      <text id="pctText" x="130" y="118" text-anchor="middle" class="circle-percent">0%</text>
      <text id="pctLabel" x="130" y="158" text-anchor="middle" class="circle-sub">compatibilitate</text>
    </svg>
  </div>

  <div class="compat-msg" id="compatMsg"></div>
</div>

<div class="footer">
  <div class="site">numeriq.ro</div>
  <div class="footer-sub">✦ &nbsp; Numerologie · Destin · Cifre &nbsp; ✦</div>
</div>

// SPARKLES
const sc = document.getElementById('sparkle-canvas');
sc.width=1080; sc.height=1920;
const sctx=sc.getContext('2d');
const sparkles=[];
function rand(a,b){return Math.random()*(b-a)+a;}
for(let i=0;i<280;i++){
  sparkles.push({x:rand(0,1080),y:rand(0,1920),size:rand(1,3.5),speed:rand(0.03,0.07),phase:rand(0,Math.PI*2),maxAlpha:rand(0.25,0.75),isStar:Math.random()>0.55,drift:(Math.random()-0.5)*0.12});
}
function animSparkles(){
  sctx.clearRect(0,0,1080,1920);
  sparkles.forEach(s=>{
    s.phase+=s.speed; s.x+=s.drift;
    if(s.x<-10)s.x=1090; if(s.x>1090)s.x=-10;
    const alpha=Math.max(0,Math.sin(s.phase))*s.maxAlpha;
    if(s.isStar){
      sctx.save();sctx.globalAlpha=alpha;sctx.strokeStyle='#C9A84C';sctx.lineWidth=0.8;sctx.shadowBlur=6;sctx.shadowColor='#C9A84C';
      const arm=s.size*3;sctx.beginPath();sctx.moveTo(s.x-arm,s.y);sctx.lineTo(s.x+arm,s.y);sctx.moveTo(s.x,s.y-arm);sctx.lineTo(s.x,s.y+arm);sctx.stroke();
      sctx.fillStyle='#E8C96A';sctx.shadowBlur=10;sctx.beginPath();sctx.arc(s.x,s.y,s.size*0.5,0,Math.PI*2);sctx.fill();sctx.restore();
    } else {
      sctx.save();sctx.globalAlpha=alpha;sctx.fillStyle='#C9A84C';sctx.shadowBlur=8;sctx.shadowColor='#C9A84C';
      sctx.beginPath();sctx.arc(s.x,s.y,s.size,0,Math.PI*2);sctx.fill();sctx.restore();
    }
  });
  requestAnimationFrame(animSparkles);
}
animSparkles();

// PARTICLES
const pc=document.getElementById('particles');
const pctx=pc.getContext('2d');
pc.width=1080; pc.height=1920;
let pts=[];
function burst(){
  for(let i=0;i<100;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*4+1;
    pts.push({x:540+(Math.random()-0.5)*800,y:960+(Math.random()-0.5)*600,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,life:1,decay:Math.random()*0.015+0.006,size:Math.random()*5+1,col:Math.random()>0.5?'#C9A84C':'#E8C96A'});
  }
}
function drawP(){
  pctx.clearRect(0,0,1080,1920);
  pts=pts.filter(p=>p.life>0);
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.life-=p.decay;
    pctx.save();pctx.globalAlpha=p.life;pctx.shadowBlur=14;pctx.shadowColor=p.col;pctx.fillStyle=p.col;
    pctx.beginPath();pctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);pctx.fill();pctx.restore();
  });
  requestAnimationFrame(drawP);
}
drawP();

// ANIMATE CIRCLE
function animateCircle(pct){
  const circumference=2*Math.PI*110;
  const arc=document.getElementById('arcCircle');
  const txt=document.getElementById('pctText');
  arc.style.strokeDashoffset=circumference;
  let current=0;
  const step=()=>{
    current+=1;
    if(current<=pct){
      const offset=circumference-(current/100)*circumference;
      arc.style.strokeDashoffset=offset;
      txt.textContent=current+'%';
      setTimeout(step,20);
    }
  };
  setTimeout(step,600);
}

// SHOW RESULT
function showResult(data){
  burst();
  document.getElementById('waiting').classList.add('hidden');
  const res=document.getElementById('result');
  res.classList.add('visible');

  document.getElementById('name1').textContent=data.name1||'';
  document.getElementById('date1').textContent=data.date1||'';
  document.getElementById('cifra1').textContent=data.cv1||'-';
  document.getElementById('name2').textContent=data.name2||'';
  document.getElementById('date2').textContent=data.date2||'';
  document.getElementById('cifra2').textContent=data.cv2||'-';

  setTimeout(()=>{
    document.getElementById('card1').classList.add('show');
    document.getElementById('card2').classList.add('show');
  },100);

  setTimeout(()=>{
    document.getElementById('circleWrap').classList.add('show');
    animateCircle(parseInt(data.pct)||0);
  },400);

  setTimeout(()=>{
    const msg=document.getElementById('compatMsg');
    msg.textContent=data.msg||'';
    msg.classList.add('show');
  },900);
}

function clearResult(){
  document.getElementById('waiting').classList.remove('hidden');
  const res=document.getElementById('result');
  res.classList.remove('visible');
  document.getElementById('card1').classList.remove('show');
  document.getElementById('card2').classList.remove('show');
  document.getElementById('circleWrap').classList.remove('show');
  document.getElementById('compatMsg').classList.remove('show');
  document.getElementById('arcCircle').style.strokeDashoffset='691';
  document.getElementById('pctText').textContent='0%';
}

// FIREBASE
onValue(ref(db,'compat'),snap=>{
  const d=snap.val();
  if(!d||!d.name1){clearResult();return;}
  showResult(d);
});

onValue(ref(db,'topic'),snap=>{
  const t=snap.val();
  if(!t)return;
  if(t.line1!==undefined)document.getElementById('wait-line1').textContent=t.line1||'';
  if(t.line2!==undefined)document.getElementById('wait-line2').textContent=t.line2||'';
});
</script>
