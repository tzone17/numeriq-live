<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>NUMERIQ Controller Compatibilitate</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0F1728;color:#F0E6CC;font-family:'Georgia',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px;gap:14px;}
h1{font-size:20px;letter-spacing:8px;color:#C9A84C;text-transform:uppercase;text-align:center;}
.sub{font-size:11px;color:#B8A97A;letter-spacing:2px;text-align:center;}
.box{width:100%;max-width:700px;background:rgba(201,168,76,0.04);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px;}
.stitle{font-size:10px;letter-spacing:4px;color:rgba(201,168,76,0.6);text-transform:uppercase;border-bottom:1px solid rgba(201,168,76,0.1);padding-bottom:5px;}
input,textarea{background:rgba(0,0,0,0.3);border:1px solid rgba(201,168,76,0.25);border-radius:8px;padding:10px 12px;color:#F0E6CC;font-size:14px;font-family:'Georgia',serif;outline:none;width:100%;}
input:focus,textarea:focus{border-color:rgba(201,168,76,0.5);}
input::placeholder,textarea::placeholder{color:rgba(240,230,204,0.25);}
textarea{height:80px;resize:none;}
.row{display:flex;gap:8px;}
.sep{height:1px;background:rgba(201,168,76,0.1);}
.badge{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:8px;padding:8px 14px;font-family:'Georgia',serif;font-size:20px;color:#C9A84C;font-weight:bold;min-width:70px;text-align:center;}
.calc-text{font-size:11px;color:#B8A97A;line-height:1.6;flex:1;padding-top:4px;}
.cv-row{display:flex;gap:8px;align-items:flex-start;}
.pct-row{display:flex;gap:8px;align-items:center;}
button{padding:11px;border:none;border-radius:8px;font-size:13px;letter-spacing:2px;cursor:pointer;font-family:'Georgia',serif;transition:all 0.15s;width:100%;}
.btn-gold{background:linear-gradient(135deg,#C9A84C,#8B6E2A);color:#0F1728;font-weight:bold;}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,168,76,0.3);}
.btn-dim{background:rgba(201,168,76,0.08);color:#B8A97A;border:1px solid rgba(201,168,76,0.2);}
.btn-sm{padding:8px;font-size:12px;}
.status{text-align:center;font-size:12px;min-height:16px;color:#B8A97A;}
.status.ok{color:#6fcf97;}.status.err{color:#eb5757;}
</style>
</head>
<body>
<h1>NUMERIQ</h1>
<div class="sub">Controller — Compatibilitate în Dragoste</div>

<div class="box">
  <!-- TITLU SESIUNE -->
  <div class="stitle">Titlul sesiunii (apare pe ecran când nu e rezultat)</div>
  <input id="tl1" type="text" placeholder="Rând 1 (ex: Compatibilitate în Dragoste)">
  <input id="tl2" type="text" placeholder="Rând 2 (ex: cu partenerul, cu firma...)">
  <button class="btn-gold btn-sm" onclick="setTopic()">✦ Setează titlul sesiunii</button>

  <div class="sep"></div>

  <!-- PERSOANA 1 -->
  <div class="stitle">Persoana 1</div>
  <input id="name1" type="text" placeholder="Nume complet (ex: Maria Ionescu)" oninput="calc()">
  <input id="date1" type="text" placeholder="Data nașterii zz.mm.aaaa (ex: 22.05.1985)" oninput="calc()">
  <div class="cv-row">
    <div class="badge" id="b1">—</div>
    <div class="calc-text" id="s1">Introdu data nașterii</div>
  </div>

  <div class="sep"></div>

  <!-- PERSOANA 2 -->
  <div class="stitle">Persoana 2</div>
  <input id="name2" type="text" placeholder="Nume complet (ex: Ion Popescu)" oninput="calc()">
  <input id="date2" type="text" placeholder="Data nașterii zz.mm.aaaa (ex: 15.09.1983)" oninput="calc()">
  <div class="cv-row">
    <div class="badge" id="b2">—</div>
    <div class="calc-text" id="s2">Introdu data nașterii</div>
  </div>

  <div class="sep"></div>

  <!-- REZULTAT -->
  <div class="stitle">Compatibilitate (calculată automat)</div>
  <div class="pct-row">
    <div class="badge" id="bpct">—%</div>
    <div class="calc-text" id="spct">Se completează după introducerea datelor</div>
  </div>
  <textarea id="msg" placeholder="Mesajul apare automat — îl poți edita înainte să afișezi"></textarea>

  <div class="row">
    <button class="btn-gold" onclick="send()">✦ Afișează pe ecran</button>
    <button class="btn-dim" onclick="clear()">✕ Șterge</button>
  </div>
  <div class="status" id="st"></div>
</div>

function getC(a,b){return T[`${a}-${b}`]||T[`${b}-${a}`]||null;}

function red(n){while(n>9&&n!==11&&n!==22&&n!==33)n=String(n).split('').reduce((a,b)=>a+parseInt(b),0);return n;}

function cvFromDate(s){
  const p=s.trim().split('.');
  if(p.length!==3||p[2].length<4)return null;
  const digs=(p[0]+p[1]+p[2]).replace(/\D/g,'');
  if(digs.length<8)return null;
  return red(digs.split('').reduce((a,b)=>a+parseInt(b),0));
}

function steps(s){
  const p=s.trim().split('.');
  if(p.length!==3)return '';
  const digs=(p[0]+p[1]+p[2]).replace(/\D/g,'');
  let n=digs.split('').reduce((a,b)=>a+parseInt(b),0),arr=[n];
  while(n>9&&n!==11&&n!==22&&n!==33){n=String(n).split('').reduce((a,b)=>a+parseInt(b),0);arr.push(n);}
  return digs.split('').join('+')+' = '+arr.join(' → ');
}

let cv1=null,cv2=null;

window.calc=function(){
  const d1=document.getElementById('date1').value;
  const d2=document.getElementById('date2').value;
  cv1=cvFromDate(d1);
  cv2=cvFromDate(d2);
  document.getElementById('b1').textContent=cv1!==null?cv1:'—';
  document.getElementById('s1').textContent=cv1!==null?steps(d1):'Format: zz.mm.aaaa';
  document.getElementById('b2').textContent=cv2!==null?cv2:'—';
  document.getElementById('s2').textContent=cv2!==null?steps(d2):'Format: zz.mm.aaaa';
  if(cv1!==null&&cv2!==null){
    const c=getC(cv1,cv2);
    if(c){
      document.getElementById('bpct').textContent=c.p+'%';
      document.getElementById('spct').textContent=`Combinație ${cv1} + ${cv2}`;
      document.getElementById('msg').value=c.m;
    }else{
      document.getElementById('bpct').textContent='—%';
      document.getElementById('spct').textContent='Combinație negăsită';
      document.getElementById('msg').value='';
    }
  }
};

function st(m,t=''){const e=document.getElementById('st');e.textContent=m;e.className='status '+t;}

window.setTopic=async function(){
  const l1=document.getElementById('tl1').value.trim();
  const l2=document.getElementById('tl2').value.trim();
  if(!l1&&!l2){st('Scrie cel puțin un rând.','err');return;}
  try{await set(ref(db,'topic_v2'),{line1:l1,line2:l2,ts:Date.now()});st('✓ Titlul setat pe ecran!','ok');}
  catch(e){st('Eroare: '+e.message,'err');}
};

window.send=async function(){
  if(!document.getElementById('name1').value.trim()||!document.getElementById('name2').value.trim()){st('Completează numele ambelor persoane.','err');return;}
  if(cv1===null||cv2===null){st('Verifică datele de naștere (format: zz.mm.aaaa).','err');return;}
  const pct=document.getElementById('bpct').textContent.replace('%','').trim();
  if(!pct||pct==='—'){st('Datele nu sunt complete.','err');return;}
  const data={
    active:true,
    name1:document.getElementById('name1').value.trim(),
    date1:document.getElementById('date1').value.trim(),
    cv1:String(cv1),
    name2:document.getElementById('name2').value.trim(),
    date2:document.getElementById('date2').value.trim(),
    cv2:String(cv2),
    pct:pct,
    msg:document.getElementById('msg').value.trim(),
    ts:Date.now()
  };
  try{await set(ref(db,'compat_v2'),data);st('✓ Apare pe ecran!','ok');}
  catch(e){st('Eroare: '+e.message,'err');}
};

window.clear=async function(){
  try{
    await set(ref(db,'compat_v2'),{active:false,ts:Date.now()});
    ['name1','date1','name2','date2','msg','tl1','tl2'].forEach(id=>document.getElementById(id).value='');
    ['b1','b2'].forEach(id=>document.getElementById(id).textContent='—');
    ['s1','s2'].forEach(id=>document.getElementById(id).textContent='Introdu data nașterii');
    document.getElementById('bpct').textContent='—%';
    document.getElementById('spct').textContent='Se completează după introducerea datelor';
    cv1=null;cv2=null;
    st('Ecranul a fost curățat.','');
  }catch(e){st('Eroare: '+e.message,'err');}
};
</script>
</body>
</html>
