// ── CIFRA VIEȚII ──
function calcCV(dateStr) {
  // Format: zz.mm.aaaa
  const parts = dateStr.trim().split('.');
  if(parts.length !== 3) return null;
  const [zi, luna, an] = parts;
  if(!zi||!luna||!an||an.length<4) return null;

  const allDigits = (zi+luna+an).replace(/\D/g,'');
  if(!allDigits) return null;

  // Sum all digits, reduce (preserve 11,22,33)
  function reduce(n) {
    while(n > 9 && n !== 11 && n !== 22 && n !== 33) {
      n = String(n).split('').reduce((a,b)=>a+parseInt(b),0);
    }
    return n;
  }

  const sum = allDigits.split('').reduce((a,b)=>a+parseInt(b),0);
  return reduce(sum);
}

function calcSteps(dateStr) {
  const parts = dateStr.trim().split('.');
  if(parts.length !== 3) return '';
  const [zi, luna, an] = parts;
  const allDigits = (zi+luna+an).replace(/\D/g,'');
  const sum = allDigits.split('').reduce((a,b)=>a+parseInt(b),0);

  function reduce(n) {
    let steps = [n];
    while(n > 9 && n !== 11 && n !== 22 && n !== 33) {
      n = String(n).split('').reduce((a,b)=>a+parseInt(b),0);
      steps.push(n);
    }
    return steps;
  }
  const steps = reduce(sum);
  const digits = allDigits.split('').join('+');
  return `${digits} = ${steps.join(' → ')}`;
}

function getCompat(c1,c2){
  const k1=`${c1}-${c2}`, k2=`${c2}-${c1}`;
  return COMPAT[k1]||COMPAT[k2]||null;
}

function reduce(n){
  while(n>9&&n!==11&&n!==22&&n!==33){
    n=String(n).split('').reduce((a,b)=>a+parseInt(b),0);
  }
  return n;
}

function calcCVfromDate(dateStr){
  const parts=dateStr.trim().split('.');
  if(parts.length!==3) return null;
  const [zi,luna,an]=parts;
  if(!zi||!luna||!an||an.length<4) return null;
  const allDigits=(zi+luna+an).replace(/\D/g,'');
  if(!allDigits||allDigits.includes('N')) return null;
  const sum=allDigits.split('').reduce((a,b)=>a+parseInt(b),0);
  return reduce(sum);
}

function calcSteps(dateStr){
  const parts=dateStr.trim().split('.');
  if(parts.length!==3) return '';
  const [zi,luna,an]=parts;
  const allDigits=(zi+luna+an).replace(/\D/g,'');
  const sum=allDigits.split('').reduce((a,b)=>a+parseInt(b),0);
  let n=sum, steps=[n];
  while(n>9&&n!==11&&n!==22&&n!==33){n=String(n).split('').reduce((a,b)=>a+parseInt(b),0);steps.push(n);}
  return `${allDigits.split('').join('+')} = ${steps.join(' → ')}`;
}

let cv1val=null, cv2val=null;

window.autoCalc=function(){
  const date1=document.getElementById('date1').value;
  const date2=document.getElementById('date2').value;

  // CV1
  const c1=calcCVfromDate(date1);
  cv1val=c1;
  const badge1=document.getElementById('cv1-badge');
  const calc1=document.getElementById('cv1-calc');
  if(c1!==null){
    badge1.textContent=c1;
    calc1.textContent=calcSteps(date1);
  } else {
    badge1.textContent='—';
    calc1.textContent='Introdu data în format zz.mm.aaaa';
  }

  // CV2
  const c2=calcCVfromDate(date2);
  cv2val=c2;
  const badge2=document.getElementById('cv2-badge');
  const calc2=document.getElementById('cv2-calc');
  if(c2!==null){
    badge2.textContent=c2;
    calc2.textContent=calcSteps(date2);
  } else {
    badge2.textContent='—';
    calc2.textContent='Introdu data în format zz.mm.aaaa';
  }

  // COMPAT
  const pctBadge=document.getElementById('pct-badge');
  const pctLabel=document.getElementById('pct-label');
  const msgEl=document.getElementById('msg');

  if(c1!==null&&c2!==null){
    const compat=getCompat(c1,c2);
    if(compat){
      pctBadge.textContent=compat.pct+'%';
      pctLabel.textContent=`Combinație ${c1} + ${c2}`;
      msgEl.value=compat.msg;
    } else {
      pctBadge.textContent='—%';
      pctLabel.textContent='Combinație negăsită în tabel';
      msgEl.value='';
    }
  } else {
    pctBadge.textContent='—%';
    pctLabel.textContent='Se calculează după introducerea datelor';
  }
};

function status(msg,type=''){const el=document.getElementById('status');el.textContent=msg;el.className='status '+type;}

window.setTopic=async function(){
  const line1=document.getElementById('topicLine1').value.trim();
  const line2=document.getElementById('topicLine2').value.trim();
  if(!line1&&!line2){status('Scrie cel puțin un rând.','err');return;}
  try{
    await set(ref(db,'topic'),{line1,line2,ts:Date.now()});
    status('✓ Titlul sesiunii setat!','ok');
  }catch(e){status('Eroare: '+e.message,'err');}
};

window.sendResult=async function(){
  const pctRaw=document.getElementById('pct-badge').textContent.replace('%','').trim();
  const data={
    name1:document.getElementById('name1').value.trim(),
    date1:document.getElementById('date1').value.trim(),
    cv1:cv1val!==null?String(cv1val):'',
    name2:document.getElementById('name2').value.trim(),
    date2:document.getElementById('date2').value.trim(),
    cv2:cv2val!==null?String(cv2val):'',
    pct:pctRaw!=='—'?pctRaw:'',
    msg:document.getElementById('msg').value.trim(),
    ts:Date.now()
  };
  if(!data.name1||!data.name2||!data.pct){status('Completează cel puțin numele și datele de naștere.','err');return;}
  try{
    await set(ref(db,'compat'),data);
    status('✓ Apare pe ecran!','ok');
  }catch(e){status('Eroare: '+e.message,'err');}
};

window.clearAll=async function(){

    await set(ref(db,'compat'),{name1:'',ts:Date.now()});
    ['name1','date1','name2','date2','msg'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('cv1-badge').textContent='—';

    document.getElementById('cv1-calc').textContent='Introdu numele și data nașterii';
    document.getElementById('cv2-calc').textContent='Introdu numele și data nașterii';
    document.getElementById('pct-badge').textContent='—%';
    document.getElementById('pct-label').textContent='Se calculează după introducerea datelor';
    cv1val=null; cv2val=null;
    status('Ecranul a fost curățat.','');
  }catch(e){status('Eroare: '+e.message,'err');}
};
